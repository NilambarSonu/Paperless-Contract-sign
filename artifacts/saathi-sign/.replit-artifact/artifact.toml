kind = "web"
previewPath = "/"
title = "Saathi Sign"
version = "1.0.0"
id = "artifacts/saathi-sign"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18519

[services.development]
run = "pnpm --filter @workspace/saathi-sign run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saathi-sign", "run", "build" ]
publicDir = "artifacts/saathi-sign/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18519"
BASE_PATH = "/"
